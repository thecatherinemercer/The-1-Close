<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catherine Mercer — Elite Sales Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dim: #8B6914;
    --black: #0A0A0A;
    --black-soft: #111111;
    --black-card: #141414;
    --black-border: #1E1E1E;
    --white: #FAF8F4;
    --white-dim: #C8C4BC;
    --white-muted: #7A7672;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── EARLY BIRD BANNER ── */
  #earlybird-bar {
    background: var(--gold);
    color: var(--black);
    text-align: center;
    padding: 0.65rem 1rem;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    position: relative;
    z-index: 101;
  }
  #earlybird-bar span { color: var(--black-soft); font-weight: 700; }
  .spots-remaining {
    display: inline-block;
    background: var(--black);
    color: var(--gold);
    padding: 0.15rem 0.6rem;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    margin-left: 0.75rem;
    font-weight: 700;
  }

  /* ── CURSOR ── */
  .cursor { 
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<!-- Early Bird Banner -->
<div id="earlybird-bar">
  🔐 <span>EARLY BIRD ACCESS</span> – Limited Spots Remaining
  <span class="spots-remaining">12 SPOTS</span>
</div>

<script>
  // Cursor tracker
  const cursor = document.createElement('div');
  cursor.className = 'cursor';
  document.body.appendChild(cursor);

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = (e.clientX - 4) + 'px';
    cursor.style.top = (e.clientY - 4) + 'px';
  });
</script>

</body>
</html>
